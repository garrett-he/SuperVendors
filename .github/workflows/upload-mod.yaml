name: Upload Mod to NexusMods

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the release'
        required: true

jobs:
  upload-to-nexusmods:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Zip mod files
        run: zip -r SuperVendors.zip src/

      - name: Upload mod to NexusMods
        id: upload
        uses: Nexus-Mods/upload-action@main
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ vars.NEXUSMODS_FILE_GROUP_ID }}
          filename: SuperVendors.zip
          display_name: SuperVendors ${{ github.event.inputs.version }} D2RMM
          description: "Make various items purchasable by vendors."
          version: ${{ github.event.release.tag_name || github.event.inputs.version }}
